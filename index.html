<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoVault | Premium Bike Explorer</title>
    <style>
        /* === BASE STYLING === */
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent: #ef4444;
            --card-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* === HEADER & NAVIGATION === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 span { color: var(--accent); }

        #back-btn {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--accent);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-10px);
        }

        #back-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        #back-btn:hover {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }

        /* === VIEW CONTAINERS === */
        .view-section {
            display: none;
            padding: 3rem 5%;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .view-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === UPGRADED HERO SECTION === */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
            padding: 6rem 2rem;
            /* Parallax effect on the background */
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.95)), url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .hero p {
            color: #cbd5e1;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* === CARD GRIDS === */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        /* === SHARED CARD STYLING === */
        .card {
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid transparent;
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        /* === UPGRADED CATEGORY CARDS === */
        .category-card {
            min-height: 280px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
        }

        .category-card::before {
            /* Smooth dark gradient over the image so text is readable */
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15, 23, 42, 1) 5%, transparent 80%);
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        .category-card:hover::before {
            opacity: 0.8;
        }

        .glass-content {
            width: 100%;
            padding: 1.5rem;
            position: relative;
            z-index: 2;
            /* Frosted glass effect */
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .category-card h3 {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .category-card p {
            color: #f8fafc;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* === BIKE LIST CARDS === */
        .bike-card {
            min-height: 350px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
        }

        .bike-card-content {
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            width: 100%;
            padding: 2.5rem 1.5rem 1.5rem;
            position: relative;
            z-index: 2;
        }

        .bike-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .bike-card p {
            color: #cbd5e1;
            font-size: 1rem;
            font-weight: bold;
        }

        .cc-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
            letter-spacing: 1px;
        }

        /* === DETAIL VIEW CARD === */
        .detail-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .detail-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }

        .detail-info {
            padding: 3rem;
        }

        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .spec-item {
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            border-radius: 15px;
            border-left: 4px solid var(--accent);
            transition: transform 0.3s ease;
        }

        .spec-item:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.08);
        }

        .spec-item span {
            display: block;
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .spec-item strong {
            font-size: 1.4rem;
            color: white;
        }

        /* Section Titles */
        .section-title {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--accent);
            margin: 15px auto 0;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
        }
    </style>
</head>
<body>

    <header>
        <h1>Moto<span>Vault</span></h1>
        <button id="back-btn" onclick="goBack()">&#8592; Back</button>
    </header>

    <main>
        <section id="view-categories" class="view-section active">
            <div class="hero">
                <h2>Find Your Perfect Ride</h2>
                <p>Select an engine displacement class to explore the top-tier motorcycles dominating that segment.</p>
            </div>
            <div class="card-grid" id="category-container">
                </div>
        </section>

        <section id="view-bikelist" class="view-section">
            <h2 class="section-title" id="list-title">Top 5 Bikes</h2>
            <div class="card-grid" id="bikelist-container">
                </div>
        </section>

        <section id="view-bikedetail" class="view-section">
            <div id="bikedetail-container">
                </div>
        </section>
    </main>

    <script>
        // --- DATA STRUCTURE ---
        const bikeData = {
            "100cc": [
                { name: "Hero Splendor Plus", price: "₹75,000", power: "8.02 PS", weight: "112 kg", desc: "The legendary commuter known for unbeatable mileage and reliability.", img: "images/hero-splendor-plus.jpg" },
                { name: "Bajaj Platina 100", price: "₹68,000", power: "7.9 PS", weight: "117 kg", desc: "Built for comfort on rough roads with advanced suspension.", img: "images/bajaj-platina-100.jpg" },
                { name: "TVS Sport", price: "₹64,000", power: "8.19 PS", weight: "110 kg", desc: "A sporty looking commuter with a highly refined engine.", img: "images/tvs-sport.jpg" },
                { name: "Honda Shine 100", price: "₹65,000", power: "7.38 PS", weight: "99 kg", desc: "Honda's most affordable offering with ultra-smooth power delivery.", img: "images/honda-shine-100.jpg" },
                { name: "Hero HF Deluxe", price: "₹60,000", power: "8.02 PS", weight: "110 kg", desc: "The perfect entry-level motorcycle for everyday city riding.", img: "images/hero-hf-deluxe.jpg" }
            ],
            "125cc": [
                { name: "KTM 125 Duke", price: "₹1.8 Lakh", power: "14.5 PS", weight: "159 kg", desc: "Aggressive streetfighter styling packed in a beginner-friendly engine.", img: "images/ktm-125-duke.jpg" },
                { name: "TVS Raider 125", price: "₹95,000", power: "11.38 PS", weight: "123 kg", desc: "The modern commuter with a digital display and punchy performance.", img: "images/tvs-raider-125.jpg" },
                { name: "Honda SP 125", price: "₹86,000", power: "10.87 PS", weight: "116 kg", desc: "Premium commuter featuring a silent start and LED headlights.", img: "images/honda-sp-125.jpg" },
                { name: "Bajaj Pulsar NS125", price: "₹1.05 Lakh", power: "12 PS", weight: "144 kg", desc: "Brings the iconic NS styling to the 125cc segment.", img: "images/bajaj-pulsar-ns125.jpg" },
                { name: "Hero Glamour XTEC", price: "₹88,000", power: "10.84 PS", weight: "122 kg", desc: "Feature-loaded commute with bluetooth connectivity and navigation.", img: "images/hero-glamour-xtec.jpg" }
            ],
            "350cc": [
                { name: "Royal Enfield Classic 350", price: "₹2.2 Lakh", power: "20.2 PS", weight: "195 kg", desc: "The timeless legend built on the new J-series platform.", img: "images/royal-enfield-classic-350.jpg" },
                { name: "Honda H'ness CB350", price: "₹2.1 Lakh", power: "21.07 PS", weight: "181 kg", desc: "Refined Japanese engineering meeting retro Indian cruiser design.", img: "images/honda-hness-cb350.jpg" },
                { name: "Royal Enfield Hunter 350", price: "₹1.7 Lakh", power: "20.2 PS", weight: "181 kg", desc: "Agile, compact, and perfect for the modern urban environment.", img: "images/royal-enfield-hunter-350.jpg" },
                { name: "Jawa 42 Bobber", price: "₹2.25 Lakh", power: "29.9 PS", weight: "185 kg", desc: "A stunning factory custom bobber with serious road presence.", img: "images/jawa-42-bobber.jpg" },
                { name: "Royal Enfield Meteor", price: "₹2.05 Lakh", power: "20.2 PS", weight: "191 kg", desc: "The ultimate cruiser for long highway rides and weekend getaways.", img: "images/royal-enfield-meteor.jpg" }
            ],
            "650cc": [
                { name: "Royal Enfield Interceptor", price: "₹3.0 Lakh", power: "47 PS", weight: "218 kg", desc: "A beautiful parallel-twin roadster that defines value-for-money.", img: "images/royal-enfield-interceptor-650.jpg" },
                { name: "Kawasaki Z650", price: "₹6.6 Lakh", power: "68 PS", weight: "191 kg", desc: "Sugomi design meets an incredibly reliable parallel-twin engine.", img: "images/kawasaki-z650.jpg" },
                { name: "Triumph Trident 660", price: "₹8.2 Lakh", power: "81 PS", weight: "189 kg", desc: "A triple-cylinder masterpiece with premium components and tech.", img: "images/triumph-trident-660.jpg" },
                { name: "Honda CBR650R", price: "₹9.3 Lakh", power: "87 PS", weight: "211 kg", desc: "A fully faired inline-four sports bike that screams to the redline.", img: "images/honda-cbr650r.jpg" },
                { name: "Royal Enfield Continental GT", price: "₹3.2 Lakh", power: "47 PS", weight: "211 kg", desc: "The purest cafe racer experience you can buy off the showroom floor.", img: "images/royal-enfield-continental-gt.jpg" }
            ],
            "1000cc": [
                { name: "Kawasaki Ninja ZX-10R", price: "₹16.5 Lakh", power: "203 PS", weight: "207 kg", desc: "Championship-winning track weapon built for ultimate speed.", img: "images/kawasaki-ninja-zx-10r.jpg" },
                { name: "BMW S1000RR", price: "₹20.5 Lakh", power: "210 PS", weight: "197 kg", desc: "German precision engineering with unmatched electronic aids.", img: "images/bmw-s1000rr.jpg" },
                { name: "Ducati Panigale V4", price: "₹27.5 Lakh", power: "215.5 PS", weight: "198 kg", desc: "Pure Italian passion and art sculpted around a MotoGP derived V4.", img: "images/ducati-panigale-v4.jpg" },
                { name: "Yamaha YZF-R1", price: "₹20.0 Lakh", power: "200 PS", weight: "201 kg", desc: "The legendary crossplane crankshaft inline-four masterpiece.", img: "images/yamaha-yzf-r1.jpg" },
                { name: "Honda CBR1000RR-R", price: "₹23.5 Lakh", power: "217 PS", weight: "201 kg", desc: "Honda's extreme Fireblade focused entirely on track dominance.", img: "images/honda-cbr1000rr-r.jpg" }
            ]
        };

        // We assign a cover image for each category from the images you already have
        const categoryCovers = {
            "100cc": "images/hero-splendor-plus.jpg",
            "125cc": "images/ktm-125-duke.jpg",
            "350cc": "images/royal-enfield-classic-350.jpg",
            "650cc": "images/royal-enfield-interceptor-650.jpg",
            "1000cc": "images/kawasaki-ninja-zx-10r.jpg"
        };

        // --- STATE MANAGEMENT ---
        let historyStack = ['view-categories'];

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            renderCategories();
        });

        // --- RENDER FUNCTIONS ---
        function renderCategories() {
            const container = document.getElementById('category-container');
            container.innerHTML = '';
            
            const categories = Object.keys(bikeData);
            
            categories.forEach(cc => {
                const card = document.createElement('div');
                card.className = 'card category-card';
                // Use the assigned cover image for this category
                card.style.backgroundImage = `url('${categoryCovers[cc]}')`;
                
                card.innerHTML = `
                    <div class="glass-content">
                        <h3>${cc}</h3>
                        <p>EXPLORE CLASS</p>
                    </div>
                `;
                card.onclick = () => showBikeList(cc);
                container.appendChild(card);
            });
        }

        function showBikeList(ccCategory) {
            const bikes = bikeData[ccCategory];
            const container = document.getElementById('bikelist-container');
            document.getElementById('list-title').innerText = `${ccCategory} Legends`;
            container.innerHTML = '';

            bikes.forEach(bike => {
                const card = document.createElement('div');
                card.className = 'card bike-card';
                card.style.backgroundImage = `url('${bike.img}')`;
                
                card.innerHTML = `
                    <div class="cc-badge">${ccCategory}</div>
                    <div class="bike-card-content">
                        <h3>${bike.name}</h3>
                        <p>${bike.price}</p>
                    </div>
                `;
                card.onclick = () => showBikeDetail(bike);
                container.appendChild(card);
            });

            switchView('view-bikelist');
        }

        function showBikeDetail(bike) {
            const container = document.getElementById('bikedetail-container');
            container.innerHTML = `
                <div class="detail-wrapper">
                    <img src="${bike.img}" alt="${bike.name}" class="detail-img">
                    <div class="detail-info">
                        <h2 style="font-size: 2.5rem; margin-bottom: 0.5rem;">${bike.name}</h2>
                        <p style="color: var(--accent); font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem;">${bike.price}</p>
                        <p style="color: #cbd5e1; line-height: 1.8; font-size: 1.1rem;">${bike.desc}</p>
                        
                        <div class="spec-grid">
                            <div class="spec-item">
                                <span>Engine Power</span>
                                <strong>${bike.power}</strong>
                            </div>
                            <div class="spec-item">
                                <span>Kerb Weight</span>
                                <strong>${bike.weight}</strong>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            switchView('view-bikedetail');
        }

        // --- NAVIGATION LOGIC ---
        function switchView(viewId) {
            const currentViewId = historyStack[historyStack.length - 1];
            document.getElementById(currentViewId).classList.remove('active');
            
            document.getElementById(viewId).classList.add('active');
            
            if(currentViewId !== viewId) {
                historyStack.push(viewId);
            }

            updateBackButton();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() {
            if (historyStack.length <= 1) return;

            const currentViewId = historyStack.pop();
            document.getElementById(currentViewId).classList.remove('active');

            const prevViewId = historyStack[historyStack.length - 1];
            document.getElementById(prevViewId).classList.add('active');

            updateBackButton();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateBackButton() {
            const btn = document.getElementById('back-btn');
            if (historyStack.length > 1) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        }
    </script>
</body>
</html>
